name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  # 当 Fetch RSS Feeds 工作流成功完成后触发
  workflow_run:
    workflows: ["Fetch RSS Feeds"]
    types:
      - completed

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: new-site/app/package-lock.json

      - name: Install dependencies
        run: cd new-site/app && npm ci

      - name: Build
        run: cd new-site/app && npm run build

      - name: Copy custom domain config
        run: cp CNAME new-site/app/dist/CNAME

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./new-site/app/dist
