name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  # 当 Fetch RSS Feeds 工作流成功完成后触发
  workflow_run:
    workflows: ["Fetch RSS Feeds"]
    types:
      - completed
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd new-site/app && npm ci

      - name: Copy data file
        run: |
          echo "Copying articles.json to public..."
          cp rss-backend/data/articles.json new-site/app/public/articles.json
          ls -la new-site/app/public/articles.json

      - name: Build
        run: cd new-site/app && npm run build

      - name: Verify dist contents
        run: |
          echo "Verifying dist contents..."
          ls -la new-site/app/dist/
          ls -la new-site/app/dist/articles.json

      - name: Copy custom domain config
        run: cp CNAME new-site/app/dist/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./new-site/app/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
