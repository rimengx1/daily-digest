name: Fetch RSS Feeds

on:
  schedule:
    # 每 6 小时运行一次
    - cron: '0 */6 * * *'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  fetch-rss:
    runs-on: ubuntu-latest
    
    # 将 API Key 提升到 job 级别，确保所有步骤都能访问
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Verify API Key
      run: |
        if [ -z "$DEEPSEEK_API_KEY" ]; then
          echo "❌ Error: DEEPSEEK_API_KEY is not set!"
          echo "   请在 GitHub Secrets 中配置 DEEPSEEK_API_KEY"
          exit 1
        else
          echo "✅ DEEPSEEK_API_KEY is configured"
        fi
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      working-directory: rss-backend
      run: |
        pip install -r requirements.txt
    
    - name: Fetch RSS feeds
      working-directory: rss-backend
      run: |
        python fetch_rss.py
    
    - name: Verify and commit changes
      run: |
        # 配置 Git（先配置，避免后续命令失败）
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # 先拉取最新更改（避免冲突，在复制数据之前！）
        git pull origin main --rebase || true
        
        # 检查数据文件是否存在
        if [ ! -f "rss-backend/data/articles.json" ]; then
          echo "❌ Error: rss-backend/data/articles.json not found!"
          exit 1
        fi
        
        # 显示数据文件大小
        echo "📄 Data file size: $(du -h rss-backend/data/articles.json | cut -f1)"
        
        # 复制数据文件到前端目录（在pull之后，确保不会被覆盖！）
        cp rss-backend/data/articles.json new-site/app/public/articles.json
        echo "📂 已同步数据到 new-site/app/public/articles.json"
        
        # 添加并提交更改
        git add rss-backend/data/articles.json
        git add new-site/app/public/articles.json
        if git diff --staged --quiet; then
          echo "ℹ️ No changes to commit"
        else
          git commit -m "Update RSS data with AI processing [$(date +%Y-%m-%d\ %H:%M)]"
          git push origin main
          echo "✅ RSS data updated and pushed"
        fi

    - name: Build and deploy frontend
      if: success()
      run: |
        echo "🚀 重新构建前端..."
        cd new-site/app
        npm install
        npm run build
        
        # 复制构建后的文件
        cp -r dist/* ../../
        
        # 提交构建结果
        git add ../../dist -f || true
        git add ../../index.html -f || true
        git add ../../assets -f || true
        git commit -m "Deploy: 更新前端构建 [$(date +%Y-%m-%d\ %H:%M)]" || echo "No changes to deploy"
        git push origin main || echo "Push failed"
