name: Fetch RSS Feeds

on:
  schedule:
    # 每 6 小时运行一次
    - cron: '0 */6 * * *'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  fetch-rss:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      working-directory: rss-backend
      run: |
        pip install -r requirements.txt
    
    - name: Fetch RSS feeds
      working-directory: rss-backend
      run: |
        python fetch_rss.py
    
    - name: Verify and commit changes
      run: |
        # 检查数据文件是否存在
        if [ ! -f "rss-backend/data/articles.json" ]; then
          echo "❌ Error: rss-backend/data/articles.json not found!"
          exit 1
        fi
        
        # 显示数据文件大小
        echo "📄 Data file size: $(du -h rss-backend/data/articles.json | cut -f1)"
        
        # 配置 Git
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # 添加并提交更改
        git add rss-backend/data/articles.json
        if git diff --staged --quiet; then
          echo "ℹ️ No changes to commit"
        else
          git commit -m "Update RSS data [$(date +%Y-%m-%d\ %H:%M)]"
          git push
          echo "✅ RSS data updated and pushed"
        fi
